# Hermes (orchestrator / product owner) -- EastRouter config. Secrets REDACTED on purpose.
provider: eastrouter
base_url: https://api.eastrouter.com/v1
api_key:  ${EASTROUTER_API_KEY}        # never commit the real sk-er_ key
model:    z-ai/glm-5.1                  # reasoning planner (200K ctx); EastRouter serves only glm-* / kimi-*
fallback_model: z-ai/glm-5-turbo        # faster fallback

memory:
  enabled: true
  store: ./agents/hermes/memory         # persists backlog, sprint state, decisions across sessions

role: product_owner
responsibilities:
  - decompose the human spec into scoped, testable issues
  - write a sprint doc to sprints/sprint-0N.md BEFORE assigning work
  - hand off ONE issue at a time to OpenClaw in #agent-coder
  - track progress; post status to #sprint-main
  - never write code, never merge -- the human merges

slack:
  app_token: ${SLACK_APP_TOKEN}
  bot_token: ${SLACK_BOT_TOKEN}
  allowed_channels: ["#sprint_main", "#agent_coder", "#agent_log", "#human_review", "#ci_cd"]
  allow_bots: mentions      # react to the coder's @mention so the loop closes (coder -> Hermes verify)
  require_mention: true
  # The handoff happens IN #agent_coder: Hermes replies there with the full work order @mentioning the
  # coder (no cross-channel send tool exists in this build). channel_prompts bake the PO behavior per channel.
  channel_prompts:
    "#agent_coder": "PO handoff room. Reply here with a COMPLETE work order that STARTS with the coder's mention (acceptance criteria, exact branch, 'open a PR do NOT merge', 'report to #agent_log'). When the coder reports back, verify against the criteria and post a verdict. Never write code yourself."

worker:
  name: openclaw
  bot_user_id: U0BDN8QJ74Z   # the coder's Slack bot id; Hermes @mentions this to dispatch it
  handoff_channel: "#agent_coder"
