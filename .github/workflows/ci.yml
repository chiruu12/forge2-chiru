name: CI
on:
  pull_request:
  push:
    branches: [ main ]
jobs:
  backend:
    runs-on: ubuntu-latest
    services:
      mysql:
        image: mysql:8
        env: { MYSQL_DATABASE: pulsedesk_test, MYSQL_ROOT_PASSWORD: root }
        ports: [ "3306:3306" ]
        options: >-
          --health-cmd="mysqladmin ping -proot" --health-interval=10s
          --health-timeout=5s --health-retries=5
    steps:
      - uses: actions/checkout@v4
      - uses: shivammathur/setup-php@v2
        with: { php-version: '8.4' }
      - name: Install
        working-directory: backend
        run: composer install --no-interaction --prefer-dist
      - name: Configure
        working-directory: backend
        run: |
          cp .env.example .env
          php artisan key:generate
          sed -i 's/^DB_HOST=.*/DB_HOST=127.0.0.1/' .env
          sed -i 's/^DB_DATABASE=.*/DB_DATABASE=pulsedesk_test/' .env
          sed -i 's/^DB_USERNAME=.*/DB_USERNAME=root/' .env
          sed -i 's/^DB_PASSWORD=.*/DB_PASSWORD=root/' .env
      - name: Migrate & test
        working-directory: backend
        run: |
          php artisan migrate --force
          php artisan test
      - name: Notify Slack (#ci_cd)
        if: always()
        run: |
          if [ "${{ job.status }}" = "success" ]; then EMOJI="✅"; else EMOJI="❌"; fi
          curl -s -X POST https://slack.com/api/chat.postMessage \
            -H "Authorization: Bearer ${{ secrets.SLACK_BOT_TOKEN }}" \
            -H "Content-Type: application/json" \
            --data "{\"channel\":\"C0BDPJ2MPRA\",\"text\":\"${EMOJI} CI ${{ job.status }} — branch \`${{ github.ref_name }}\` (${GITHUB_SHA:0:7}) · run https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}\"}" || true
